# D2 Generator Comparison — MiniMax-M2.7 via Anthropic SDK
# Retrieval: dense_sharded + cross-encoder rerank, top_k=5 (same as Phase 4 C3)
#
# Required env vars (.env):
#   ANTHROPIC_API_KEY=<minimax_api_key>
#   MINIMAX_ANTHROPIC_BASE_URL=https://api.minimax.io/anthropic

experiment:
  name: "d2-minimax-m27"
  seed: 42

retrieval:
  top_k: 5
  retrieve_top_k: 100
  mode: "dense_sharded"
  dense_shards_manifest_path: "E:/rag-benchmark-indexes/wiki18_21m_dense_sharded/manifest.json"
  nprobe: 16
  dedup_mode: "title"
  dedup_before_rerank: true
  title_first_rerank: false
  title_pool_k: 40
  max_chunks_per_title: 2
  min_unique_titles: 6

generation:
  mode: "anthropic"
  model: "MiniMax-M2.7"
  api_key_env: "ANTHROPIC_API_KEY"
  api_base_env: "MINIMAX_ANTHROPIC_BASE_URL"
  system_prompt: "You answer questions based on the retrieved context. Extract the most relevant information from the context to answer the question. Keep the answer short and factual, a few words or one sentence."
  temperature: 0.0
  max_output_tokens: 4096
  timeout_sec: 120

query_expansion:
  mode: "off"

evaluation:
  recall_k: 5
