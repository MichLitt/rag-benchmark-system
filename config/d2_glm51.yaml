# D2 Generator Comparison — GLM-5.1 via OpenAI-compatible coding plan endpoint
# Retrieval: dense_sharded + cross-encoder rerank, top_k=5 (same as Phase 4 C3)
#
# Required env vars (.env):
#   GLM_API_KEY=<glm_api_key>
#   GLM_BASE_URL=https://api.z.ai/api/coding/paas/v4

experiment:
  name: "d2-glm-51"
  seed: 42

retrieval:
  top_k: 5
  retrieve_top_k: 100
  mode: "dense_sharded"
  dense_shards_manifest_path: "E:/rag-benchmark-indexes/wiki18_21m_dense_sharded/manifest.json"
  nprobe: 16
  dedup_mode: "title"
  dedup_before_rerank: true
  title_first_rerank: false
  title_pool_k: 40
  max_chunks_per_title: 2
  min_unique_titles: 6

generation:
  mode: "openai_compatible"
  model: "glm-5.1"
  api_key_env: "GLM_API_KEY"
  api_base_env: "GLM_BASE_URL"
  system_prompt: "You answer questions based on the retrieved context. Extract the most relevant information from the context to answer the question. Keep the answer short and factual, a few words or one sentence."
  temperature: 0.0
  max_output_tokens: 256
  max_completion_tokens: 2048
  reasoning_split: "auto"
  timeout_sec: 60

query_expansion:
  mode: "off"

evaluation:
  recall_k: 5
