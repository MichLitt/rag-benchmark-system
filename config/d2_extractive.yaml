# D2 Generator Comparison — Extractive baseline (no LLM)
# Retrieval: dense_sharded + cross-encoder rerank, top_k=5 (same as Phase 4 C3)

experiment:
  name: "d2-extractive"
  seed: 42

retrieval:
  top_k: 5
  retrieve_top_k: 100
  mode: "dense_sharded"
  dense_shards_manifest_path: "E:/rag-benchmark-indexes/wiki18_21m_dense_sharded/manifest.json"
  nprobe: 16
  dedup_mode: "title"
  dedup_before_rerank: true
  title_first_rerank: false
  title_pool_k: 40
  max_chunks_per_title: 2
  min_unique_titles: 6

generation:
  mode: "extractive"

query_expansion:
  mode: "off"

evaluation:
  recall_k: 5
