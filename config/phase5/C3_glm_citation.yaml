experiment:
  name: "phase5-C3-glm-citation"
  seed: 42
  postprocess_answers: true  # strip hedging + "Final answer:" prefix

retrieval:
  top_k: 5
  retrieve_top_k: 100
  mode: "dense_sharded"
  dense_shards_manifest_path: "E:/rag-benchmark-indexes/wiki18_21m_dense_sharded/manifest.json"
  nprobe: 16
  dedup_mode: "title"
  dedup_before_rerank: true
  title_first_rerank: false
  title_pool_k: 40
  max_chunks_per_title: 2
  min_unique_titles: 6
  hybrid_alpha: 0.5
  hybrid_rrf_k: 60
  hybrid_candidate_k: 50

generation:
  mode: "openai_compatible"
  model: "glm-z1-air"
  api_base: ""
  api_base_env: "GLM_BASE_URL"
  api_key_env: "GLM_API_KEY"
  system_prompt: "You answer questions based on the retrieved context. Extract the most relevant information from the context to answer the question. Keep the answer short and factual, a few words or one sentence."
  temperature: 0.0
  max_output_tokens: 256      # slightly higher to accommodate [N] citations
  max_completion_tokens: 8192
  reasoning_split: false
  timeout_sec: 180
  input_price_per_1m: 0.0
  output_price_per_1m: 0.0
  dataset: ""
  citation_constrained: true  # wraps generator in CitationConstrainedGenerator
  score_citations: true       # loads HHEMScorer (loaded once, amortised over N samples)
  nli_threshold: 0.5

query_expansion:
  mode: "off"
  datasets: []
  model: ""
  api_base: ""
  api_base_env: ""
  api_key_env: ""
  cache_dir: "experiments/cache/query_expansion"
  temperature: 0.0
  max_completion_tokens: 256
  include_original_query: true
  max_queries: 3
  timeout_sec: 60

evaluation:
  recall_k: 5
